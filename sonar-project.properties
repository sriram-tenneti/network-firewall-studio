sonar.projectKey=network-firewall-studio
sonar.projectName=Network Firewall Studio
sonar.projectVersion=1.0.0

# Source directories
sonar.sources=firewall-studio-backend/app,firewall-studio-frontend/src
sonar.tests=firewall-studio-backend/src/test,firewall-studio-frontend/src/test

# Exclusions
sonar.exclusions=**/node_modules/**,**/*.test.*,**/__pycache__/**,**/htmlcov/**,**/coverage/**,**/.venv/**,**/dist/**,**/build/**

# Python settings
sonar.python.version=3.12
sonar.python.coverage.reportPaths=firewall-studio-backend/coverage.xml

# TypeScript/JavaScript settings
sonar.typescript.lcov.reportPaths=firewall-studio-frontend/coverage/lcov.info
sonar.javascript.lcov.reportPaths=firewall-studio-frontend/coverage/lcov.info

# Encoding
sonar.sourceEncoding=UTF-8

# Quality gate
sonar.qualitygate.wait=true
